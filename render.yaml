services:
  - type: web
    name: lastcommit
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn gateway:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false        # Set manually in Render dashboard — never commit the real key
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: LOG_LEVEL
        value: info
